<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>多模态幻觉 · 论文学习</title>
<link rel="stylesheet" href="style.css" />
<script src="vendor/marked.min.js"></script>
</head>
<body>
  <header id="topbar">
    <div class="brand">📚 多模态幻觉 · 论文学习</div>
    <div class="filters">
      <input id="search" type="text" placeholder="搜索标题 / 会议…" />
      <div id="yearFilters" class="chips"></div>
      <span id="progressSummary" class="summary"></span>
    </div>
  </header>

  <main id="layout">
    <!-- 左：论文列表 -->
    <aside id="sidebar"></aside>

    <!-- 中：PDF -->
    <section id="viewer">
      <div id="viewerEmpty" class="empty">← 从左侧选择一篇论文开始</div>
      <iframe id="pdf" title="PDF" style="display:none"></iframe>
    </section>

    <!-- 右：讲解 / 笔记 -->
    <section id="panel">
      <div id="panelHead">
        <div id="paperTitle" class="paper-title">—</div>
        <div class="status-row">
          <label>状态：</label>
          <select id="statusSel">
            <option>未开始</option>
            <option>学习中</option>
            <option>已理解</option>
          </select>
        </div>
        <div class="tabs">
          <button class="tab active" data-tab="explainer">📖 论文讲解</button>
          <button class="tab" data-tab="note">✍️ 我的笔记</button>
        </div>
      </div>

      <!-- 讲解（只读） -->
      <div id="tab-explainer" class="tabpane active">
        <div id="explainerView" class="markdown">选择论文后，这里显示我写的详细讲解。</div>
      </div>

      <!-- 笔记（可编辑） -->
      <div id="tab-note" class="tabpane">
        <div class="note-toolbar">
          <button id="btnEdit" class="mini">✏️ 编辑</button>
          <button id="btnPreview" class="mini">👁 预览</button>
          <button id="btnSave" class="mini primary">💾 保存</button>
          <span id="saveHint" class="hint"></span>
        </div>
        <textarea id="noteEdit" placeholder="在这里记笔记（支持 Markdown）。也可以让我在对话里说“记录”，我会直接写到这个文件。" style="display:none"></textarea>
        <div id="notePreview" class="markdown"></div>
      </div>
    </section>
  </main>
<script src="app.js"></script>
</body>
</html>
